# Gruvbox Color Palette
# Source this file with: source = ~/.config/hypr/gruvbox.conf

# ── Dark Backgrounds ──
$bg0_h  = rgb(1d2021)
$bg0_s  = rgb(32302f)
$bg0    = rgb(282828)
$bg1    = rgb(3c3836)
$bg2    = rgb(504945)
$bg3    = rgb(665c54)
$bg4    = rgb(7c6f64)

# ── Dark Foregrounds ──
$fg0    = rgb(fbf1c7)
$fg1    = rgb(ebdbb2)
$fg2    = rgb(d5c4a1)
$fg3    = rgb(bdae93)
$fg4    = rgb(a89984)

# ── Normal Colors ──
$red    = rgb(cc241d)
$green  = rgb(98971a)
$yellow = rgb(d79921)
$blue   = rgb(458588)
$purple = rgb(b16286)
$aqua   = rgb(689d6a)
$orange = rgb(d65d0e)
$gray   = rgb(928374)

# ── Bright Colors ──
$red_bright    = rgb(fb4934)
$green_bright  = rgb(b8bb26)
$yellow_bright = rgb(fabd2f)
$blue_bright   = rgb(83a598)
$purple_bright = rgb(d3869b)
$aqua_bright   = rgb(8ec07c)
$orange_bright = rgb(fe8019)
$gray_bright   = rgb(928374)

# ── With Alpha (rgba for borders, shadows etc.) ──
# Usage: rgba(cc241dff) — last 2 digits are opacity (ff = fully opaque)
$red_a    = rgba(cc241dff)
$green_a  = rgba(98971aff)
$yellow_a = rgba(d79921ff)
$blue_a   = rgba(458588ff)
$purple_a = rgba(b16286ff)
$aqua_a   = rgba(689d6aff)
$orange_a = rgba(d65d0eff)
$bg0_a    = rgba(282828ff)
$bg1_a    = rgba(3c3836ff)
